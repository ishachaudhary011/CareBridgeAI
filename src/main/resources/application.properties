spring.datasource.url=jdbc:mysql://localhost:3306/carebridge_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8081
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.audio.transcription.base-url=https://api.groq.com/openai
spring.ai.openai.audio.transcription.options.model=whisper-large-v3
spring.ai.openai.audio.transcription.options.response-format=json
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
sambanova.api.url=https://api.sambanova.ai/v1/chat/completions
sambanova.api.key=${SAMBANOVA_API_KEY}